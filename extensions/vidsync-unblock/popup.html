<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VidSync Unblock</title>
    <style>
      body {
        font: 13px/1.45 system-ui, sans-serif;
        margin: 0;
        padding: 12px 14px;
        width: 280px;
        color: #eef0f5;
        background: #0b0c0f;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 6px;
        font-weight: 600;
      }
      p {
        margin: 0 0 8px;
        color: #8b90a0;
        font-size: 12px;
      }
      a {
        color: #6ee7b7;
      }
      .ok {
        color: #6ee7b7;
        font-weight: 600;
        font-size: 12px;
      }
      .warn {
        color: #fbbf24;
        font-size: 11px;
      }
      button {
        width: 100%;
        margin-top: 6px;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: #6ee7b7;
        color: #000;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>VidSync Unblock</h1>
    <p class="ok" id="status">Ready</p>
    <p class="warn">
      Chrome won’t open this popup by itself when you visit VidSync — click the
      puzzle/icon. On the site you should see “Unblock on” in the room header.
    </p>
    <p>
      Fetches media you queue so CORS isn’t your problem. Does not upload
      files.
    </p>
    <p id="ver"></p>
    <button type="button" id="open">Open VidSync</button>
    <script src="popup.js"></script>
  </body>
</html>
