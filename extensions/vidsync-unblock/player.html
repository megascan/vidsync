<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VidSync Player</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0c0f;
        color: #eef0f5;
        font: 13px/1.4 system-ui, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid #272a33;
        flex-shrink: 0;
      }
      header strong {
        color: #6ee7b7;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      #status {
        color: #8b90a0;
        font-size: 11px;
      }
      #stage {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }
      video {
        width: 100%;
        height: 100%;
        max-height: 100%;
        background: #000;
      }
      #url {
        padding: 6px 12px;
        font-family: ui-monospace, monospace;
        font-size: 10px;
        color: #8b90a0;
        border-top: 1px solid #272a33;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .hint {
        padding: 24px;
        text-align: center;
        color: #8b90a0;
        max-width: 360px;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>VIDSYNC PLAYER</strong>
      <span id="status">Waiting for stream…</span>
    </header>
    <div id="stage">
      <video id="video" playsinline controls></video>
      <div id="empty" class="hint" hidden>
        No media URL. Open a stream from the VidSync room with
        <strong>Stream with Unblock</strong>.
      </div>
    </div>
    <div id="url"></div>
    <script src="player.js"></script>
  </body>
</html>
