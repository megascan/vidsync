# Build VidSync desktop (Windows + Linux) on every push to master,
# sign updater artifacts, upload installers to R2, deploy landing.

name: Desktop release

on:
  push:
    branches: [master]
    paths:
      - "apps/desktop/**"
      - "apps/site/**"
      - ".github/workflows/desktop-release.yml"
      - "packages/shared/**"
  workflow_dispatch:

concurrency:
  group: desktop-release
  cancel-in-progress: true

permissions:
  contents: read

env:
  R2_BUCKET: vidsync-releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
          - platform: ubuntu-22.04
            os_name: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          shared-key: desktop-${{ matrix.os_name }}

      - name: Linux system deps
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend deps
        working-directory: apps/desktop
        run: bun install

      - name: Build Tauri (signed updater artifacts)
        working-directory: apps/desktop
        run: bunx tauri build
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect Windows artifacts
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-out | Out-Null
          $nsisDir = "apps/desktop/src-tauri/target/release/bundle/nsis"
          $msiDir = "apps/desktop/src-tauri/target/release/bundle/msi"
          $nsis = Get-ChildItem -Path $nsisDir -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          $msi = Get-ChildItem -Path $msiDir -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          $exe = "apps/desktop/src-tauri/target/release/vidsync-desktop.exe"
          if ($nsis) {
            Copy-Item $nsis.FullName dist-out/VidSync-windows-setup.exe
            $sig = "$($nsis.FullName).sig"
            if (Test-Path $sig) { Copy-Item $sig dist-out/VidSync-windows-setup.exe.sig }
          }
          if ($msi) {
            Copy-Item $msi.FullName dist-out/VidSync-windows.msi
            $sig = "$($msi.FullName).sig"
            if (Test-Path $sig) { Copy-Item $sig dist-out/VidSync-windows.msi.sig }
          }
          if (Test-Path $exe) { Copy-Item $exe dist-out/VidSync-windows.exe }
          Get-ChildItem dist-out | Format-Table Name, Length

      - name: Collect Linux artifacts
        if: matrix.os_name == 'linux'
        run: |
          mkdir -p dist-out
          APPIMAGE=$(find apps/desktop/src-tauri/target/release/bundle/appimage -name '*.AppImage' 2>/dev/null | head -n1 || true)
          DEB=$(find apps/desktop/src-tauri/target/release/bundle/deb -name '*.deb' 2>/dev/null | head -n1 || true)
          BIN="apps/desktop/src-tauri/target/release/vidsync-desktop"
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" dist-out/VidSync-linux.AppImage
            [ -f "${APPIMAGE}.sig" ] && cp "${APPIMAGE}.sig" dist-out/VidSync-linux.AppImage.sig
          fi
          if [ -n "$DEB" ]; then
            cp "$DEB" dist-out/VidSync-linux.deb
          fi
          [ -f "$BIN" ] && cp "$BIN" dist-out/VidSync-linux
          ls -la dist-out || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vidsync-${{ matrix.os_name }}
          path: dist-out/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: vidsync-windows
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: vidsync-linux
          path: artifacts/linux

      - name: Install site deps
        working-directory: apps/site
        run: bun install

      - name: Build latest.json + updater.json + stage downloads
        id: meta
        env:
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p stage/downloads/windows stage/downloads/linux

          stage_win() {
            local src="$1" dest="$2"
            if [ -f "$src" ]; then
              cp "$src" "stage/downloads/windows/$dest"
            fi
          }
          stage_lin() {
            local src="$1" dest="$2"
            if [ -f "$src" ]; then
              cp "$src" "stage/downloads/linux/$dest"
            fi
          }

          stage_win artifacts/windows/VidSync-windows-setup.exe VidSync-windows-setup.exe
          stage_win artifacts/windows/VidSync-windows-setup.exe.sig VidSync-windows-setup.exe.sig
          stage_win artifacts/windows/VidSync-windows.msi VidSync-windows.msi
          stage_win artifacts/windows/VidSync-windows.exe VidSync-windows.exe

          stage_lin artifacts/linux/VidSync-linux.AppImage VidSync-linux.AppImage
          stage_lin artifacts/linux/VidSync-linux.AppImage.sig VidSync-linux.AppImage.sig
          stage_lin artifacts/linux/VidSync-linux.deb VidSync-linux.deb
          stage_lin artifacts/linux/VidSync-linux VidSync-linux

          if [ -f stage/downloads/linux/VidSync-linux.AppImage ]; then
            chmod +x stage/downloads/linux/VidSync-linux.AppImage
          fi
          if [ -f stage/downloads/linux/VidSync-linux ]; then
            chmod +x stage/downloads/linux/VidSync-linux
          fi

          node apps/site/scripts/make-latest.mjs stage "$VERSION" "$COMMIT"
          node apps/site/scripts/make-updater.mjs stage "$VERSION" "https://vidsync.ratt.ing"
          cp stage/latest.json apps/site/public/latest.json
          cp stage/updater.json apps/site/public/updater.json
          echo "--- staged files ---"
          find stage -type f -printf '%p %s\n'

      - name: Upload to R2 (S3 API)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ]; then
            echo "Missing R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ACCOUNT_ID secrets"
            exit 1
          fi
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          upload() {
            local file="$1"
            local key="$2"
            echo "R2 put s3://${R2_BUCKET}/${key} <- $file"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${key}" --endpoint-url "$ENDPOINT"
          }

          upload stage/latest.json latest.json
          upload stage/updater.json updater.json
          for f in stage/downloads/windows/*; do
            [ -f "$f" ] || continue
            upload "$f" "downloads/windows/$(basename "$f")"
          done
          for f in stage/downloads/linux/*; do
            [ -f "$f" ] || continue
            upload "$f" "downloads/linux/$(basename "$f")"
          done

      # No wrangler here. Live Worker reads R2 — new binaries/json go live without redeploy.
      # Site code (worker.ts / public HTML) changes: deploy manually:
      #   cd apps/site && bunx wrangler deploy
