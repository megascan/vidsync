# Build VidSync desktop (Windows + Linux) on every push to master,
# upload installers to R2, deploy landing page to vidsync.ratt.ing.

name: Desktop release

on:
  push:
    branches: [master]
    paths:
      - "apps/desktop/**"
      - "apps/site/**"
      - ".github/workflows/desktop-release.yml"
      - "packages/shared/**"
  workflow_dispatch:

concurrency:
  group: desktop-release
  cancel-in-progress: true

permissions:
  contents: read

env:
  R2_BUCKET: vidsync-releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
          - platform: ubuntu-22.04
            os_name: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          shared-key: desktop-${{ matrix.os_name }}

      - name: Linux system deps
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend deps
        working-directory: apps/desktop
        run: bun install

      - name: Build Tauri
        working-directory: apps/desktop
        run: bunx tauri build
        env:
          # Avoid interactive prompts
          CI: true

      - name: Collect Windows artifacts
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-out | Out-Null
          $nsis = Get-ChildItem -Path apps/desktop/src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          $msi = Get-ChildItem -Path apps/desktop/src-tauri/target/release/bundle/msi -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          $exe = "apps/desktop/src-tauri/target/release/vidsync-desktop.exe"
          if ($nsis) { Copy-Item $nsis.FullName dist-out/VidSync-windows-setup.exe }
          if ($msi) { Copy-Item $msi.FullName dist-out/VidSync-windows.msi }
          if (Test-Path $exe) { Copy-Item $exe dist-out/VidSync-windows.exe }

      - name: Collect Linux artifacts
        if: matrix.os_name == 'linux'
        run: |
          mkdir -p dist-out
          APPIMAGE=$(find apps/desktop/src-tauri/target/release/bundle/appimage -name '*.AppImage' 2>/dev/null | head -n1 || true)
          DEB=$(find apps/desktop/src-tauri/target/release/bundle/deb -name '*.deb' 2>/dev/null | head -n1 || true)
          BIN="apps/desktop/src-tauri/target/release/vidsync-desktop"
          [ -n "$APPIMAGE" ] && cp "$APPIMAGE" dist-out/VidSync-linux.AppImage
          [ -n "$DEB" ] && cp "$DEB" dist-out/VidSync-linux.deb
          [ -f "$BIN" ] && cp "$BIN" dist-out/VidSync-linux
          ls -la dist-out || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vidsync-${{ matrix.os_name }}
          path: dist-out/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: vidsync-windows
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: vidsync-linux
          path: artifacts/linux

      - name: Install site deps
        working-directory: apps/site
        run: bun install

      - name: Build latest.json + stage downloads
        id: meta
        env:
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p stage/downloads/windows stage/downloads/linux

          if [ -f artifacts/windows/VidSync-windows-setup.exe ]; then
            cp artifacts/windows/VidSync-windows-setup.exe stage/downloads/windows/
          fi
          if [ -f artifacts/windows/VidSync-windows.msi ]; then
            cp artifacts/windows/VidSync-windows.msi stage/downloads/windows/
          fi
          if [ -f artifacts/windows/VidSync-windows.exe ]; then
            cp artifacts/windows/VidSync-windows.exe stage/downloads/windows/
          fi

          if [ -f artifacts/linux/VidSync-linux.AppImage ]; then
            cp artifacts/linux/VidSync-linux.AppImage stage/downloads/linux/
            chmod +x stage/downloads/linux/VidSync-linux.AppImage
          fi
          if [ -f artifacts/linux/VidSync-linux.deb ]; then
            cp artifacts/linux/VidSync-linux.deb stage/downloads/linux/
          fi
          if [ -f artifacts/linux/VidSync-linux ]; then
            cp artifacts/linux/VidSync-linux stage/downloads/linux/
            chmod +x stage/downloads/linux/VidSync-linux
          fi

          node apps/site/scripts/make-latest.mjs stage "$VERSION" "$COMMIT"
          cp stage/latest.json apps/site/public/latest.json
          echo "--- staged files ---"
          find stage -type f -printf '%p %s\n'

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/site
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID secrets"
            exit 1
          fi

          upload() {
            local file="$1"
            local key="$2"
            echo "R2 put $key <- $file"
            bunx wrangler r2 object put "${R2_BUCKET}/${key}" --file="$file" --remote
          }

          # Binaries + latest.json
          upload ../../stage/latest.json latest.json
          for f in ../../stage/downloads/windows/*; do
            [ -f "$f" ] || continue
            upload "$f" "downloads/windows/$(basename "$f")"
          done
          for f in ../../stage/downloads/linux/*; do
            [ -f "$f" ] || continue
            upload "$f" "downloads/linux/$(basename "$f")"
          done

      - name: Deploy landing site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/site
        run: bunx wrangler deploy
